<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Current Events - Chess.com Club Widget">
  <title>Current Events 🎯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fff5f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
    }
    .events-wrapper {
      width: 100%;
      max-width: 350px;
      background: #fff5f0;
      border-radius: 18px;
      padding: 12px;
    }
    .sec-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #c73520;
      margin-bottom: 8px;
    }
    .sec-label .dot {
      width: 12px;
      height: 10px;
      border-radius: 50%;
      background: #d93020;
      flex-shrink: 0;
    }
    .events-card {
      background: #fff;
      border-radius: 18px;
      border: 2px solid #f5c5b8;
      padding: 14px;
      box-shadow: 0 4px 0 #e8aa98;
    }
    .event-box {
      display: flex;
      align-items: center;
      background: #fff8f5;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: 2px solid #f5c5b8;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      color: inherit;
    }
    .event-box:last-child { margin-bottom: 0; }
    .event-box:hover {
      background: #fce8e0;
      border-color: #d93020;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #d93020;
    }
    .event-box:hover .opponent-avatar {
      transform: scale(1.08);
      border-color: #d93020;
    }
    .event-box:hover .event-name {
      color: #d93020;
    }
    .event-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }
    .event-name {
      color: #c73520;
      font-weight: 800;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s ease;
    }
    .opponent-label {
      color: #9a2010;
      font-size: 10px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .opponent-label span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .opponent-avatar-link {
      display: block;
      margin-left: auto;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      width: 48px;
      height: 48px;
      border: 2px solid #f5c5b8;
      transition: all 0.15s ease;
      background: #f5c5b8;
      position: relative;
    }
    .opponent-avatar-link:focus {
      outline: 2px solid #d93020;
      outline-offset: 2px;
    }
    .opponent-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.15s ease;
    }
    .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #d93020, #e85535);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
    }
    .result-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 8px;
      font-weight: 800;
      color: #fff;
      border: 2px solid #fff;
    }
    .result-win { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .result-loss { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .result-draw { background: linear-gradient(135deg, #eab308, #ca8a04); }
    .loading-text {
      color: #9a2010;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      padding: 20px 0;
    }
    .empty-text {
      color: #e8aa98;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      padding: 20px 0;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .events-wrapper { background: #252525; }
      .events-card { background: #2d2d2d; border-color: #4a4a4a; }
      .sec-label { color: #ff8a80; }
      .event-box { background: #2d2d2d; border-color: #4a4a4a; }
      .event-box:hover { background: #3d3d3d; border-color: #e8553a; box-shadow: 0 5px 0 #e8553a; }
      .event-box:hover .opponent-avatar { border-color: #e8553a; }
      .event-box:hover .event-name { color: #e8553a; }
      .opponent-avatar-link { border-color: #4a4a4a; background: #4a4a4a; }
      .opponent-avatar-link:focus { outline-color: #e8553a; }
      .event-name { color: #ff8a80; }
      .opponent-label { color: #ffab91; }
      .result-badge { border-color: #2d2d2d; }
    }

    @media (prefers-reduced-motion: reduce) {
      .event-box, .opponent-avatar, .opponent-avatar-link { transition: none; }
    }

    @media (max-width: 320px) {
      .event-box { padding: 8px 10px; }
      .event-name { font-size: 12px; }
      .opponent-avatar-link { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>
  <div class="events-wrapper">
    <div class="sec-label">
      <div class="dot"></div>
      <span>Current Events 🎯</span>
    </div>
    <div class="events-card">
      <div id="eventList">
        <div class="loading-text">Loading events...</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const clubSlug = urlParams.get('club') || 'hot-chilli-checkmate';
      const clubName = urlParams.get('name') || 'Your Club';
      const maxEvents = 3;

      const eventList = document.getElementById('eventList');
      const clubCache = {};

      function capitalizeName(str) {
        if (!str) return "";
        return str.replace(/-/g, ' ')
                  .split(' ')
                  .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                  .join(' ');
      }

      function getInitials(name) {
        return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      }

      async function fetchClubIcon(clubUrl) {
        const slug = clubUrl.split('/').pop();
        if (clubCache[slug]) return clubCache[slug];

        try {
          const r = await fetch(clubUrl);
          if (!r.ok) throw new Error('Failed to fetch club');
          const data = await r.json();
          clubCache[slug] = {
            name: data.name,
            icon: data.icon || null,
            url: data.url
          };
          return clubCache[slug];
        } catch (e) {
          console.error(e);
          return { name: capitalizeName(slug), icon: null, url: clubUrl };
        }
      }

      async function loadMatches() {
        try {
          const r = await fetch('https://api.chess.com/pub/club/' + clubSlug + '/matches');
          if (!r.ok) throw new Error('Failed to load');
          const d = await r.json();

          const finished = (d.finished || []);

          if (finished.length === 0) {
            eventList.innerHTML = '<div class="empty-text">No recent events</div>';
            return;
          }

          eventList.innerHTML = '';

          const matchesToShow = finished.slice(0, maxEvents);

          for (const m of matchesToShow) {
            const matchId = m['@id'].split('/').pop();
            const webUrl = 'https://www.chess.com/club/matches/' + matchId;
            const clubData = await fetchClubIcon(m.opponent);
            const opponentName = clubData.name;
            const opponentIcon = clubData.icon;
            const opponentUrl = clubData.url;

            const result = (m.result || 'draw').toLowerCase();
            let resultClass = 'result-draw';
            let resultText = 'DRAW';

            if (result === 'win') {
              resultClass = 'result-win';
              resultText = 'WIN';
            } else if (result === 'loss') {
              resultClass = 'result-loss';
              resultText = 'LOSS';
            }

            const avatarHtml = opponentIcon
              ? `<img class="opponent-avatar" src="${opponentIcon}" alt="${opponentName} club avatar" loading="lazy">`
              : `<div class="avatar-placeholder">${getInitials(opponentName)}</div>`;

            eventList.innerHTML += `
              <a href="${webUrl}" target="_blank" rel="noopener noreferrer" class="event-box" aria-label="View match against ${opponentName}">
                <div class="event-info">
                  <span class="event-name">${m.name || 'Club Match'}</span>
                  <span class="opponent-label">
                    <span>vs ${opponentName}</span>
                  </span>
                </div>
                <span class="opponent-avatar-link" aria-hidden="true">
                  ${avatarHtml}
                  <span class="result-badge ${resultClass}">${resultText}</span>
                </span>
              </a>
            `;
          }
        } catch (e) {
          console.error(e);
          eventList.innerHTML = '<div class="loading-text">Failed to load events</div>';
        }
      }

      loadMatches();
    })();
  </script>
</body>
</html>
