<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Upcoming Events - Chess.com Club Widget">
  <title>Upcoming Events 🎯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #fff5f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
    }
    .events-wrapper {
      width: 100%;
      max-width: 350px;
      background: #fff5f0;
      border-radius: 18px;
      padding: 12px;
    }
    .sec-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #c73520;
      margin-bottom: 8px;
    }
    .sec-label .dot {
      width: 12px;
      height: 10px;
      border-radius: 50%;
      background: #d93020;
      flex-shrink: 0;
    }
    .events-card {
      background: #fff;
      border-radius: 18px;
      border: 2px solid #f5c5b8;
      padding: 14px;
      box-shadow: 0 4px 0 #e8aa98;
    }
    .event-box {
      display: flex;
      align-items: center;
      background: #fff8f5;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: 2px solid #f5c5b8;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      color: inherit;
    }
    .event-box:last-child {
      margin-bottom: 0;
    }
    .event-box:hover {
      background: #fce8e0;
      border-color: #d93020;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #d93020;
    }
    .date-badge {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      margin-right: 12px;
      background: linear-gradient(135deg, #d93020, #e85535);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .date-month {
      font-size: 9px;
      color: rgba(255,255,255,0.85);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
    }
    .date-day {
      font-size: 16px;
      color: #fff;
      font-weight: 800;
      line-height: 1.1;
    }
    .info-container {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }
    .club-name {
      color: #c73520;
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .opponent-name {
      color: #9a2010;
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vs-text {
      color: #d93020;
      font-size: 10px;
      font-weight: 700;
      margin-top: 2px;
    }
    .loading-text {
      color: #9a2010;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      padding: 20px 0;
    }
    .empty-text {
      color: #e8aa98;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      padding: 20px 0;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .events-wrapper { background: #252525; }
      .events-card { background: #2d2d2d; border-color: #4a4a4a; }
      .sec-label { color: #ff8a80; }
      .event-box { background: #2d2d2d; border-color: #4a4a4a; }
      .event-box:hover { background: #3d3d3d; border-color: #e8553a; }
      .club-name { color: #ff8a80; }
      .opponent-name { color: #ffab91; }
    }

    @media (prefers-reduced-motion: reduce) {
      .event-box { transition: none; }
    }
  </style>
</head>
<body>
  <div class="events-wrapper">
    <div class="sec-label">
      <div class="dot"></div>
      <span>Upcoming Events 🎯</span>
    </div>
    <div class="events-card">
      <div id="eventList">
        <div class="loading-text">Loading events...</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const clubSlug = urlParams.get('club') || 'hot-chilli-checkmate';
      const clubName = urlParams.get('name') || 'Your Club';
      const maxEvents = parseInt(urlParams.get('limit')) || 5;

      const eventList = document.getElementById('eventList');

      function formatDate(timestamp) {
        const date = new Date(timestamp * 1000);
        const month = date.toLocaleString('en-US', { month: 'short' });
        const day = date.getDate();
        return { month, day };
      }

      function capitalizeName(str) {
        if (!str) return "";
        return str.replace(/-/g, ' ')
                  .split(' ')
                  .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                  .join(' ');
      }

      async function loadMatches() {
        try {
          const r = await fetch('https://api.chess.com/pub/club/' + clubSlug + '/matches');
          if (!r.ok) throw new Error('Failed to load');
          const d = await r.json();

          const upcoming = (d.registered || []).filter(m => m.start_time);

          if (upcoming.length === 0) {
            eventList.innerHTML = '<div class="empty-text">No upcoming events</div>';
            return;
          }

          eventList.innerHTML = '';

          upcoming.sort((a, b) => a.start_time - b.start_time)
                  .slice(0, maxEvents)
                  .forEach(m => {
                    const { month, day } = formatDate(m.start_time);
                    const matchId = m['@id'].split('/').pop();
                    const webUrl = 'https://www.chess.com/club/matches/' + matchId;
                    const slug = m.opponent.split('/').pop();
                    const opponent = capitalizeName(slug);

                    eventList.innerHTML += `
                      <a href="${webUrl}" target="_blank" class="event-box">
                        <div class="date-badge">
                          <span class="date-month">${month}</span>
                          <span class="date-day">${day}</span>
                        </div>
                        <div class="info-container">
                          <span class="club-name">${clubName}</span>
                          <span class="opponent-name">${opponent}</span>
                          <span class="vs-text">vs</span>
                        </div>
                      </a>
                    `;
                  });
        } catch (e) {
          console.error(e);
          eventList.innerHTML = '<div class="loading-text">Failed to load events</div>';
        }
      }

      loadMatches();
    })();
  </script>
</body>
</html>
